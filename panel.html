<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Panel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;
  --accent:#4a9eff;--ok:#3ecf8e;--err:#ff4455;--warn:#f0a000;--purple:#c084fc;
  --text:#e8e8f0;--dim:#6b6b80;--mid:#a0a0b8;
  --mono:"Cascadia Code","Fira Code","Consolas",monospace
}
html,body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#topbar{
  display:flex;align-items:center;gap:12px;padding:7px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0
}
#topbar-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
#agent-count{font-family:var(--mono);font-size:11px;color:var(--mid)}
#dot{width:7px;height:7px;border-radius:50%;background:var(--err);flex-shrink:0;margin-left:auto}
#dot.live{background:var(--ok)}

#grid{
  display:grid;grid-template-columns:1fr;flex:1;min-height:0;gap:1px;background:var(--border);
  overflow:auto;grid-auto-rows:minmax(200px,1fr)
}

.pane{background:var(--bg);display:flex;flex-direction:column;min-height:0;min-width:0}
.pane-head{
  display:flex;align-items:center;gap:8px;padding:6px 12px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0
}
.agent-pill{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 9px;border-radius:10px}
.pane-status{font-family:var(--mono);font-size:10px;color:var(--dim)}
.pane-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0;margin-left:auto}
.pane-dot.live{background:var(--ok)}
.pane-dot.pending{background:var(--warn)}

.pane-img{
  flex:1;display:flex;align-items:center;justify-content:center;padding:8px;
  min-height:0;overflow:hidden;border-bottom:1px solid var(--border)
}
.pane-img img{max-width:100%;max-height:100%;object-fit:contain;display:none}
.pane-img .placeholder{color:var(--border);font-size:11px;font-family:var(--mono)}

.pane-text{
  flex-shrink:0;max-height:120px;padding:10px 12px;font-family:var(--mono);font-size:11px;
  color:var(--mid);line-height:1.65;white-space:pre-wrap;word-break:break-word;
  overflow-y:auto;border-bottom:1px solid var(--border)
}
.pane-text .placeholder{color:var(--border)}

.pane-hist{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:5px 10px;background:var(--surface);overflow-x:auto;min-height:30px
}
.pane-hist::-webkit-scrollbar{height:3px}
.pane-hist::-webkit-scrollbar-thumb{background:var(--border)}
.chip{
  flex-shrink:0;display:flex;align-items:center;gap:4px;
  background:var(--surface2);border:1px solid var(--border);border-radius:4px;
  padding:2px 7px;font-family:var(--mono);font-size:10px;white-space:nowrap
}
.chip .cdur{color:var(--mid)}
.chip .cok{width:5px;height:5px;border-radius:50%;background:var(--ok);flex-shrink:0}
.chip .cerr{width:5px;height:5px;border-radius:50%;background:var(--err);flex-shrink:0}
</style>
</head>
<body>

<div id="topbar">
  <span id="topbar-title">Panel</span>
  <span id="agent-count">0 agents</span>
  <div id="dot"></div>
</div>
<div id="grid"></div>

<script type="module">
const IS_FILE = location.protocol === 'file:';
const PANEL_ORIGIN = IS_FILE ? 'http://127.0.0.1:1236' : '';
const SENTINEL = 'NONE';
const grid = document.getElementById('grid');
const dot = document.getElementById('dot');
const agentCount = document.getElementById('agent-count');
const panes = new Map();
const colorMap = new Map();

const COLORS = ['#4a9eff','#3ecf8e','#f0a000','#c084fc','#ff4455','#06b6d4','#f97316','#a3e635'];
let colorIdx = 0;

function plog(level, msg, extra) {
  const entry = {level, msg, ts: Date.now()};
  if (extra) entry.extra = extra;
  try { fetch(`${PANEL_ORIGIN}/panel-log`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry)}); } catch (err) { console.warn('plog failed:', err); }
}

function agentColor(name) {
  if (!colorMap.has(name)) colorMap.set(name, COLORS[(colorIdx++) % COLORS.length]);
  return colorMap.get(name);
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function showImage(p, b64) {
  p.img.style.display = 'block';
  p.imgPlaceholder.style.display = 'none';
  const copy = b64;
  p.img.src = `data:image/png;base64,${copy}`;
}

function setPlaceholder(el, text) {
  el.textContent = '';
  const ph = document.createElement('span');
  ph.className = 'placeholder';
  ph.textContent = text;
  el.appendChild(ph);
}

function updateGridLayout() {
  const count = panes.size;
  const cols = Math.min(count, 5);
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  agentCount.textContent = `${count} agent${count === 1 ? '' : 's'}`;
}

function getOrCreatePane(agent) {
  if (panes.has(agent)) return panes.get(agent);

  const color = agentColor(agent);
  const pane = document.createElement('div');
  pane.className = 'pane';

  const head = document.createElement('div');
  head.className = 'pane-head';
  const pill = document.createElement('span');
  pill.className = 'agent-pill';
  pill.style.background = hexToRgba(color, 0.15);
  pill.style.color = color;
  pill.textContent = agent;
  const statusSpan = document.createElement('span');
  statusSpan.className = 'pane-status';
  const pdot = document.createElement('span');
  pdot.className = 'pane-dot';
  head.append(pill, statusSpan, pdot);

  const imgWrap = document.createElement('div');
  imgWrap.className = 'pane-img';
  const img = document.createElement('img');
  img.alt = '';
  const imgPh = document.createElement('span');
  imgPh.className = 'placeholder';
  imgPh.textContent = 'no image';
  imgWrap.append(img, imgPh);

  const textDiv = document.createElement('div');
  textDiv.className = 'pane-text';
  setPlaceholder(textDiv, 'waiting...');

  const histDiv = document.createElement('div');
  histDiv.className = 'pane-hist';

  pane.append(head, imgWrap, textDiv, histDiv);
  grid.appendChild(pane);

  const p = {status: statusSpan, pdot, img, imgPlaceholder: imgPh, text: textDiv, hist: histDiv, lastTs: 0};
  panes.set(agent, p);
  updateGridLayout();
  return p;
}

function addChip(p, dur, ok) {
  const chip = document.createElement('div');
  chip.className = 'chip';
  const cdur = document.createElement('span');
  cdur.className = 'cdur';
  cdur.textContent = dur;
  const cstatus = document.createElement('span');
  cstatus.className = ok ? 'cok' : 'cerr';
  chip.append(cdur, cstatus);
  p.hist.appendChild(chip);
  chip.scrollIntoView({behavior:'smooth',inline:'end'});
}

async function postResult(requestId, imageB64) {
  try {
    await fetch(`${PANEL_ORIGIN}/result`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({request_id: requestId, image_b64: imageB64})});
  } catch (err) {
    plog('error', 'result_post_failed', {request_id: requestId, error: String(err)});
  }
}

const drawPolygonOn = (ctx, ov, w, h) => {
  const NORM = 1000;
  const pts = (ov.points||[]).map(p=>[(p[0]||0)*w/NORM,(p[1]||0)*h/NORM]);
  if (pts.length < 2) return;
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  if (ov.closed) ctx.closePath();
  if (ov.fill){ctx.fillStyle=ov.fill;ctx.fill();}
  if (ov.stroke){ctx.strokeStyle=ov.stroke;ctx.lineWidth=ov.stroke_width||1;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();}
};

const renderAnnotated = async (raw_b64, overlays) => {
  const img = await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=`data:image/png;base64,${raw_b64}`;});
  const oc = new OffscreenCanvas(img.naturalWidth, img.naturalHeight);
  const ctx = oc.getContext('2d');
  ctx.drawImage(img,0,0);
  for (const ov of overlays) drawPolygonOn(ctx, ov, img.naturalWidth, img.naturalHeight);
  const blob = await oc.convertToBlob({type:'image/png'});
  const buf = await blob.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
};

const es = new EventSource(`${PANEL_ORIGIN}/agent-events?agent=ui`);
es.addEventListener('connected', () => { dot.className = 'live'; plog('info', 'sse_connected'); });
es.onerror = () => { dot.className = ''; plog('warn', 'sse_error'); };

es.addEventListener('annotate', async e => {
  let d;
  try { d = JSON.parse(e.data); } catch (err) { plog('error', 'annotate_json_parse_failed', {error: String(err)}); return; }
  plog('info', 'annotate_received', {request_id: d.request_id, agent: d.agent, overlays_count: (d.overlays||[]).length, has_image: d.image_b64 !== SENTINEL});

  if (d.image_b64 !== SENTINEL) {
    if ((d.overlays||[]).length > 0) {
      try {
        const annotated_b64 = await renderAnnotated(d.image_b64, d.overlays);
        await postResult(d.request_id, annotated_b64);
        plog('info', 'annotate_rendered', {request_id: d.request_id});
      } catch (err) {
        plog('error', 'annotate_render_failed', {request_id: d.request_id, error: String(err)});
      }
    } else {
      await postResult(d.request_id, d.image_b64);
      plog('info', 'annotate_passthrough', {request_id: d.request_id});
    }
  } else {
    await postResult(d.request_id, SENTINEL);
    plog('info', 'annotate_no_image', {request_id: d.request_id});
  }
});

es.addEventListener('message', e => {
  let d;
  try { d = JSON.parse(e.data); } catch (err) { plog('error', 'message_json_parse_failed', {error: String(err)}); return; }
  const sender = d.sender || 'unknown';
  const eventType = d.event_type || 'update';
  const p = getOrCreatePane(sender);

  if (d.status) {
    p.status.textContent = d.status;
  }

  if (d.text && d.text !== SENTINEL) {
    p.text.textContent = d.text;
  }

  if (d.image_b64 && d.image_b64 !== SENTINEL) {
    showImage(p, d.image_b64);
  }

  if (eventType === 'pending') {
    p.pdot.className = 'pane-dot pending';
    p.lastTs = Date.now();
  } else if (eventType === 'done') {
    p.pdot.className = 'pane-dot live';
    const dur = `${((Date.now() - (p.lastTs || Date.now())) / 1000).toFixed(1)}s`;
    addChip(p, dur, !d.error);
  } else if (eventType === 'error') {
    p.pdot.className = 'pane-dot';
    if (d.text && d.text !== SENTINEL) {
      p.text.textContent = d.text;
    }
    const dur = `${((Date.now() - (p.lastTs || Date.now())) / 1000).toFixed(1)}s`;
    addChip(p, dur, false);
  }

  plog('info', 'message_received', {sender, event_type: eventType, request_id: d.request_id || SENTINEL});
});
</script>
</body>
</html>
